<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quran Track</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 50px 40px;
            background: var(--card-bg);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: var(--shadow), 0 0 50px rgba(244, 196, 48, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(244, 196, 48, 0.3);
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(244, 196, 48, 0.1), transparent);
            animation: shimmer 3s linear infinite;
            pointer-events: none;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .ramadhan-header {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        
        .ramadhan-icons {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .login-title {
            color: var(--secondary-color);
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(244, 196, 48, 0.5);
            background: linear-gradient(45deg, var(--secondary-color), #fff, var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow-text 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow-text {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-style: italic;
        }
        
        .google-btn {
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            color: #444;
            border: 2px solid var(--secondary-color);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1), 0 0 20px rgba(244, 196, 48, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .google-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(244, 196, 48, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
        }
        
        .google-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2), 0 0 30px rgba(244, 196, 48, 0.4);
            border-color: var(--secondary-color);
        }
        
        .google-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .google-icon {
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 1;
        }
        
        .user-info {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 2px solid var(--secondary-color);
            position: relative;
            z-index: 1;
        }
        
        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid var(--secondary-color);
            box-shadow: 0 0 20px rgba(244, 196, 48, 0.3);
        }
        
        .user-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }
        
        .user-email {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        
        .logout-btn {
            background: linear-gradient(135deg, var(--warning-color), #ff6b35);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
        
        .continue-btn {
            background: linear-gradient(135deg, var(--primary-color), #4a90e2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.3);
        }
        
        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 90, 160, 0.4);
        }
        
        .ramadhan-decoration {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            animation: twinkle 2s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 0.7; transform: scale(1.1); }
        }
        
        .decoration-1 { top: 20px; left: 20px; animation-delay: 0s; }
        .decoration-2 { top: 20px; right: 20px; animation-delay: 0.5s; }
        .decoration-3 { bottom: 20px; left: 20px; animation-delay: 1s; }
        .decoration-4 { bottom: 20px; right: 20px; animation-delay: 1.5s; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="login-container">
        <div class="ramadhan-decoration decoration-1">🌙</div>
        <div class="ramadhan-decoration decoration-2">⭐</div>
        <div class="ramadhan-decoration decoration-3">🕌</div>
        <div class="ramadhan-decoration decoration-4">✨</div>
        
        <div class="ramadhan-header">
            <div class="ramadhan-icons">🌙 ⭐ 🕌</div>
            <h1 class="login-title">Quran Track</h1>
            <p class="login-subtitle">"Dan Kami turunkan dari Al-Quran suatu yang menjadi penawar dan rahmat bagi orang-orang yang beriman"</p>
        </div>
        
        <div id="loginSection">
            <button class="google-btn" id="googleSignInBtn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                🌙 Masuk dengan Google
            </button>
        </div>
        
    </div>

    <script>
        // Create stars animation
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            const numberOfStars = 100;
            
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Initialize stars
        createStars();
    </script>

    <!-- Firebase Configuration -->
    <script type="module" src="firebase-config.js"></script>
    
    <!-- Google Sign-In Integration -->
    <script type="module" src="auth-integration.js"></script>
